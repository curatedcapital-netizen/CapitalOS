<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#141414" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Capital OS" />
  <meta name="description" content="Elite capital allocation system" />
  <link rel="manifest" href="/manifest.json" />
  <title>Capital OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; background: #141414; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overscroll-behavior: none; overscroll-behavior-y: contain; }
    @supports (padding-top: env(safe-area-inset-top)) {
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    }
    main { -webkit-overflow-scrolling: touch; }
    #loading {
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px;
      height: 100vh; background: #141414; color: #777;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px; letter-spacing: 3px; text-transform: uppercase; font-weight: 300;
    }
    #status { font-size: 11px; color: #444; letter-spacing: 1px; }
    #error-box { display: none; color: #C47070; font-size: 12px; text-transform: none; letter-spacing: 0; padding: 20px 40px; text-align: left; max-width: 600px; line-height: 1.6; word-break: break-word; }

    /* ── Mobile responsive ── */
    @media (max-width: 768px) {
      nav { padding: 0 12px !important; height: 48px !important; }
      nav > div:first-child { gap: 8px !important; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      nav > div:first-child::-webkit-scrollbar { display: none; }
      nav button { padding: 14px 8px !important; font-size: 9px !important; white-space: nowrap; }
      main { padding: 20px 16px 100px !important; }
    }
    @media (max-width: 480px) {
      nav > div:first-child > span:first-child { font-size: 11px !important; letter-spacing: 2px !important; }
      nav > div:first-child > div:first-of-type { display: none !important; }
      nav > div:last-child { display: none !important; }
    }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>
</head>
<body>
  <div id="loading">
    Capital OS
    <div id="status">loading...</div>
    <div id="error-box"></div>
  </div>
  <div id="root"></div>

  <script>
    function showError(msg) {
      document.getElementById("status").style.display = "none";
      var eb = document.getElementById("error-box");
      eb.style.display = "block";
      eb.innerHTML = msg;
    }
    window.onerror = function(m, s, l) { showError("Runtime error: " + m + " (line " + l + ")"); };

    (function boot() {
      var status = document.getElementById("status");
      if (typeof React === "undefined") { showError("React failed to load"); return; }
      if (typeof ReactDOM === "undefined") { showError("ReactDOM failed to load"); return; }
      if (typeof Recharts === "undefined") { showError("Recharts failed to load"); return; }
      if (typeof Babel === "undefined") { showError("Babel failed to load"); return; }
      status.textContent = "libraries loaded...";

      fetch("capital-os.jsx")
        .then(function(res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.text();
        })
        .then(function(code) {
          status.textContent = "transpiling...";

          // Fix bare catch blocks (just in case)
          code = code.replace(/catch\s*\{/g, "catch(e) {");

          var output;
          try {
            output = Babel.transform(code, {
              presets: ["react"],
              filename: "capital-os.jsx"
            });
          } catch(e) {
            showError("Babel transform error:<br><br>" + e.message);
            return;
          }

          status.textContent = "mounting...";

          var runtime = [
            "var { useState, useMemo, useEffect, useCallback, useRef } = React;",
            "var { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, AreaChart, Area, LineChart, Line, CartesianGrid } = Recharts;",
            output.code,
            "document.getElementById('loading').style.display = 'none';",
            "ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CapitalOS));"
          ].join("\n");

          try {
            var fn = new Function(runtime);
            fn();
          } catch(e) {
            showError("Execution error:<br><br>" + e.message + "<br><br>Stack: " + (e.stack || "").substring(0, 500));
          }
        })
        .catch(function(e) {
          showError("Failed to load capital-os.jsx:<br><br>" + e.message);
        });
    })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("/sw.js").catch(function() {});
      });
    }
  </script>
</body>
</html>
